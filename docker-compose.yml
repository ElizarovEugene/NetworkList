services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - backend-data:/data
    cap_add:
      - NET_RAW
      - NET_ADMIN
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  backend-data:
